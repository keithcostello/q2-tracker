<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q2 Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body class="dashboard-body">

<h2>Q2 Tracker Dashboard</h2>

<div class="stats-row" id="stats-row"></div>

<div class="chart-card">
  <h3>Spending by Category</h3>
  <canvas id="spendingChart"></canvas>
</div>

<div class="chart-card">
  <h3>Defusion Success Rate by Trigger</h3>
  <canvas id="defusionChart"></canvas>
</div>

<div class="chart-card">
  <h3>Mood & Energy Over Time</h3>
  <canvas id="moodChart"></canvas>
</div>

<script>
const COLORS = ['#6c63ff','#ff6b6b','#4ecdc4','#ffd93d','#c44dff'];
const API = '';
const API_TOKEN = '{{ api_token }}';
const AUTH_HEADERS = {'Authorization': 'Bearer ' + API_TOKEN};

async function authFetch(url) {
  const resp = await fetch(API + url, {headers: AUTH_HEADERS});
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  return resp.json();
}

async function loadDashboard() {
  const [spending, defusion, checkins] = await Promise.all([
    authFetch('/api/spending/summary'),
    authFetch('/api/defusion/success-rate'),
    authFetch('/api/checkins'),
  ]);

  // Stats row
  const totalSpend = spending.reduce((s, c) => s + c.total, 0);
  const avgRate = defusion.length
    ? (defusion.reduce((s, d) => s + d.rate, 0) / defusion.length).toFixed(0)
    : '—';
  const lastCheckin = checkins.length ? checkins[0] : null;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="value">$${totalSpend.toFixed(0)}</div><div class="label">Total Spending</div></div>
    <div class="stat-card"><div class="value">${avgRate}%</div><div class="label">Defusion Rate</div></div>
    <div class="stat-card"><div class="value">${lastCheckin ? lastCheckin.mood : '—'}</div><div class="label">Last Mood</div></div>
    <div class="stat-card"><div class="value">${lastCheckin ? lastCheckin.energy : '—'}</div><div class="label">Last Energy</div></div>
  `;

  // Spending chart
  new Chart(document.getElementById('spendingChart'), {
    type: 'bar',
    data: {
      labels: spending.map(s => s.category),
      datasets: [{
        data: spending.map(s => s.total),
        backgroundColor: COLORS,
        borderRadius: 6,
      }]
    },
    options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
  });

  // Defusion chart
  new Chart(document.getElementById('defusionChart'), {
    type: 'bar',
    data: {
      labels: defusion.map(d => d.trigger_type),
      datasets: [{
        label: 'Success %',
        data: defusion.map(d => d.rate),
        backgroundColor: '#4ecdc4',
        borderRadius: 6,
      }]
    },
    options: { scales: { y: { beginAtZero: true, max: 100 } } }
  });

  // Mood/energy chart
  const sorted = [...checkins].reverse();
  new Chart(document.getElementById('moodChart'), {
    type: 'line',
    data: {
      labels: sorted.map(c => new Date(c.timestamp).toLocaleDateString()),
      datasets: [
        { label: 'Mood', data: sorted.map(c => c.mood), borderColor: '#6c63ff', tension: 0.3 },
        { label: 'Energy', data: sorted.map(c => c.energy), borderColor: '#ff6b6b', tension: 0.3 }
      ]
    },
    options: { scales: { y: { beginAtZero: true, max: 5 } } }
  });
}

loadDashboard();
</script>

</body>
</html>
