<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Q2 Tracker">
<title>Q2 Tracker</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #242836;
    --border: #2a2e3a;
    --text: #e4e4e7;
    --text-dim: #8b8d98;
    --accent: #6c8cff;
    --accent-glow: rgba(108, 140, 255, 0.15);
    --green: #4ade80;
    --amber: #fbbf24;
    --red: #f87171;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .tab-bar {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .tab-btn {
    flex: 1;
    padding: 14px 8px 10px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab-btn .tab-icon { display: block; font-size: 20px; margin-bottom: 2px; }
  .tab-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px 100px;
    display: none;
  }
  .tab-content.active { display: block; }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .amount-display {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    margin-bottom: 20px;
  }
  .amount-display .dollar {
    font-size: 42px;
    font-weight: 300;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  .amount-display .dollar .currency {
    font-size: 24px;
    color: var(--text-dim);
    vertical-align: top;
    margin-right: 2px;
  }
  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .numpad button {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 22px;
    font-weight: 400;
    padding: 16px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .numpad button:active { background: var(--surface-hover); }
  .numpad .backspace { font-size: 18px; color: var(--text-dim); }
  .category-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .category-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    padding: 14px 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .category-btn:active, .category-btn.selected {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: var(--accent);
  }
  .category-btn .cat-icon { display: block; font-size: 22px; margin-bottom: 4px; }
  .save-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .save-btn:disabled { opacity: 0.3; cursor: default; }
  .save-btn:active:not(:disabled) { opacity: 0.85; }
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--green);
    color: #000;
    padding: 10px 24px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .recent-list { margin-top: 24px; }
  .recent-entry {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .recent-entry .entry-cat { color: var(--text-dim); }
  .recent-entry .entry-amount { font-weight: 600; font-variant-numeric: tabular-nums; }
  .recent-entry .entry-time { color: var(--text-dim); font-size: 12px; }
  .defusion-start {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
  }
  .start-btn {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--accent);
    color: var(--accent);
    font-size: 20px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 40px var(--accent-glow);
  }
  .start-btn:active { transform: scale(0.95); box-shadow: 0 0 60px var(--accent-glow); }
  .defusion-script { text-align: center; padding: 24px 16px; }
  .script-text {
    font-size: 20px;
    font-weight: 300;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 32px;
    font-style: italic;
  }
  .timer-ring { width: 200px; height: 200px; margin: 0 auto 24px; position: relative; }
  .timer-ring svg { transform: rotate(-90deg); width: 200px; height: 200px; }
  .timer-ring .ring-bg { fill: none; stroke: var(--border); stroke-width: 4; }
  .timer-ring .ring-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 565.48;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear;
  }
  .timer-ring .timer-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: 200;
    font-variant-numeric: tabular-nums;
    color: var(--accent);
  }
  .timer-label { font-size: 13px; color: var(--text-dim); margin-bottom: 32px; }
  .defusion-followup { padding: 16px 0; }
  .followup-section { margin-bottom: 24px; }
  .followup-options { display: flex; flex-wrap: wrap; gap: 8px; }
  .followup-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    font-size: 14px;
    padding: 10px 18px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .followup-btn:active, .followup-btn.selected {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: var(--accent);
  }
  .intensity-row { display: flex; gap: 8px; }
  .intensity-btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 18px;
    font-weight: 500;
    padding: 14px 8px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .intensity-btn:active, .intensity-btn.selected {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: var(--accent);
  }
  .outcome-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .outcome-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    padding: 16px 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .outcome-btn:active, .outcome-btn.selected { border-color: var(--accent); color: var(--accent); }
  .outcome-btn.stayed.selected { background: rgba(74, 222, 128, 0.1); border-color: var(--green); color: var(--green); }
  .outcome-btn.didnt.selected { background: rgba(251, 191, 36, 0.1); border-color: var(--amber); color: var(--amber); }
  .checkin-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 60vh;
    justify-content: center;
  }
  .checkin-columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    width: 100%;
    max-width: 400px;
  }
  .checkin-column { display: flex; flex-direction: column; gap: 8px; }
  .column-header {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-align: center;
    margin-bottom: 8px;
  }
  .checkin-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    padding: 14px 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .checkin-btn:active, .checkin-btn.selected {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: var(--accent);
  }
  .checkin-btn .num { font-size: 18px; font-weight: 600; width: 24px; text-align: center; }
  .checkin-btn .label { font-weight: 400; }
  .checkin-save { margin-top: 32px; width: 100%; max-width: 400px; }
  .export-section { margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--border); }
  .export-btn {
    width: 100%;
    padding: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 8px;
  }
  .export-btn:active { background: var(--surface-hover); }
  .data-count { text-align: center; font-size: 12px; color: var(--text-dim); margin-top: 8px; }
  .hidden { display: none !important; }
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .tab-bar { padding-bottom: env(safe-area-inset-bottom); }
    .tab-content { padding-bottom: calc(100px + env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>
<nav class="tab-bar">
  <button class="tab-btn active" data-tab="spending"><span class="tab-icon">$</span>Spending</button>
  <button class="tab-btn" data-tab="defusion"><span class="tab-icon">~</span>Defusion</button>
  <button class="tab-btn" data-tab="checkin"><span class="tab-icon">+</span>Check-In</button>
</nav>
<div class="tab-content active" id="tab-spending">
  <div class="amount-display">
    <div class="dollar"><span class="currency">$</span><span id="amount-value">0.00</span></div>
  </div>
  <div class="numpad">
    <button onclick="numpad('1')">1</button>
    <button onclick="numpad('2')">2</button>
    <button onclick="numpad('3')">3</button>
    <button onclick="numpad('4')">4</button>
    <button onclick="numpad('5')">5</button>
    <button onclick="numpad('6')">6</button>
    <button onclick="numpad('7')">7</button>
    <button onclick="numpad('8')">8</button>
    <button onclick="numpad('9')">9</button>
    <button onclick="numpad('.')">.</button>
    <button onclick="numpad('0')">0</button>
    <button class="backspace" onclick="numpad('del')">&#9003;</button>
  </div>
  <p class="section-title">Category</p>
  <div class="category-grid">
    <button class="category-btn" data-cat="Groceries" onclick="selectCategory(this)"><span class="cat-icon">&#x1F6D2;</span>Groceries</button>
    <button class="category-btn" data-cat="Subscriptions" onclick="selectCategory(this)"><span class="cat-icon">&#x1F504;</span>Subscriptions</button>
    <button class="category-btn" data-cat="Entertainment" onclick="selectCategory(this)"><span class="cat-icon">&#x1F3AC;</span>Entertainment</button>
    <button class="category-btn" data-cat="Dining Out" onclick="selectCategory(this)"><span class="cat-icon">&#x1F37D;</span>Dining Out</button>
    <button class="category-btn" data-cat="Shopping" onclick="selectCategory(this)"><span class="cat-icon">&#x1F6CD;</span>Shopping</button>
  </div>
  <button class="save-btn" id="spending-save" disabled onclick="saveSpending()">Save Entry</button>
  <div class="recent-list" id="recent-spending"></div>
  <div class="export-section">
    <button class="export-btn" onclick="exportData('spending')">Export Spending Data</button>
    <button class="export-btn" onclick="exportData('all')">Export All Data</button>
    <div class="data-count" id="data-counts"></div>
  </div>
</div>
<div class="tab-content" id="tab-defusion">
  <div class="defusion-start" id="defusion-ready">
    <button class="start-btn" onclick="startDefusion()">Start</button>
    <p style="color: var(--text-dim); margin-top: 20px; font-size: 14px;">Tap when you notice a craving</p>
  </div>
  <div class="defusion-script hidden" id="defusion-timer">
    <p class="script-text">"I notice this thought. I am watching it. It is not a command."</p>
    <div class="timer-ring">
      <svg viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="90"/>
        <circle class="ring-progress" id="ring-progress" cx="100" cy="100" r="90"/>
      </svg>
      <div class="timer-text" id="timer-display">2:00</div>
    </div>
    <p class="timer-label">Observe. Don't push away. Don't act.</p>
  </div>
  <div class="defusion-followup hidden" id="defusion-followup">
    <div class="followup-section">
      <p class="section-title">What triggered it?</p>
      <div class="followup-options" id="trigger-options">
        <button class="followup-btn" data-val="Smell" onclick="selectTrigger(this)">Smell</button>
        <button class="followup-btn" data-val="Sight" onclick="selectTrigger(this)">Sight</button>
        <button class="followup-btn" data-val="Walk-by" onclick="selectTrigger(this)">Walk-by</button>
        <button class="followup-btn" data-val="Thought" onclick="selectTrigger(this)">Thought</button>
      </div>
    </div>
    <div class="followup-section">
      <p class="section-title">How strong was the pull?</p>
      <div class="intensity-row" id="intensity-options">
        <button class="intensity-btn" data-val="1" onclick="selectIntensity(this)">1</button>
        <button class="intensity-btn" data-val="2" onclick="selectIntensity(this)">2</button>
        <button class="intensity-btn" data-val="3" onclick="selectIntensity(this)">3</button>
        <button class="intensity-btn" data-val="4" onclick="selectIntensity(this)">4</button>
        <button class="intensity-btn" data-val="5" onclick="selectIntensity(this)">5</button>
      </div>
    </div>
    <div class="followup-section">
      <p class="section-title">What happened?</p>
      <div class="outcome-row" id="outcome-options">
        <button class="outcome-btn stayed" data-val="Stayed on plan" onclick="selectOutcome(this)">Stayed on plan</button>
        <button class="outcome-btn didnt" data-val="Didn't this time" onclick="selectOutcome(this)">Didn't this time</button>
      </div>
    </div>
    <button class="save-btn" id="defusion-save" disabled onclick="saveDefusion()">Save</button>
  </div>
  <div class="export-section" id="defusion-export">
    <div class="recent-list" id="recent-defusion"></div>
  </div>
</div>
<div class="tab-content" id="tab-checkin">
  <div class="checkin-container">
    <div class="checkin-columns">
      <div class="checkin-column" id="energy-col">
        <div class="column-header">Energy</div>
        <button class="checkin-btn" data-val="5" onclick="selectEnergy(this)"><span class="num">5</span><span class="label">Sharp</span></button>
        <button class="checkin-btn" data-val="4" onclick="selectEnergy(this)"><span class="num">4</span><span class="label">Strong</span></button>
        <button class="checkin-btn" data-val="3" onclick="selectEnergy(this)"><span class="num">3</span><span class="label">Steady</span></button>
        <button class="checkin-btn" data-val="2" onclick="selectEnergy(this)"><span class="num">2</span><span class="label">Low</span></button>
        <button class="checkin-btn" data-val="1" onclick="selectEnergy(this)"><span class="num">1</span><span class="label">Dragging</span></button>
      </div>
      <div class="checkin-column" id="mood-col">
        <div class="column-header">Mood</div>
        <button class="checkin-btn" data-val="5" onclick="selectMood(this)"><span class="num">5</span><span class="label">Bright</span></button>
        <button class="checkin-btn" data-val="4" onclick="selectMood(this)"><span class="num">4</span><span class="label">Good</span></button>
        <button class="checkin-btn" data-val="3" onclick="selectMood(this)"><span class="num">3</span><span class="label">Okay</span></button>
        <button class="checkin-btn" data-val="2" onclick="selectMood(this)"><span class="num">2</span><span class="label">Flat</span></button>
        <button class="checkin-btn" data-val="1" onclick="selectMood(this)"><span class="num">1</span><span class="label">Heavy</span></button>
      </div>
    </div>
    <div class="checkin-save">
      <button class="save-btn" id="checkin-save" disabled onclick="saveCheckin()">Save Check-In</button>
    </div>
  </div>
  <div class="recent-list" id="recent-checkin"></div>
</div>
<div class="toast" id="toast">Saved</div>
<script>
function getData(key) {
  try { return JSON.parse(localStorage.getItem('q2_' + key)) || []; }
  catch(e) { return []; }
}
function setData(key, val) { localStorage.setItem('q2_' + key, JSON.stringify(val)); }

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg || 'Saved';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

let amountStr = '';
let selectedCategory = null;

function numpad(key) {
  if (key === 'del') { amountStr = amountStr.slice(0, -1); }
  else if (key === '.') {
    if (amountStr.includes('.')) return;
    if (amountStr === '') amountStr = '0';
    amountStr += '.';
  } else {
    if (amountStr.includes('.') && amountStr.split('.')[1].length >= 2) return;
    if (amountStr === '0' && key !== '.') amountStr = '';
    amountStr += key;
  }
  const display = document.getElementById('amount-value');
  if (amountStr === '' || amountStr === '0') display.textContent = '0.00';
  else if (amountStr.endsWith('.')) display.textContent = amountStr + '00';
  else if (amountStr.includes('.') && amountStr.split('.')[1].length === 1) display.textContent = amountStr + '0';
  else if (!amountStr.includes('.')) display.textContent = amountStr + '.00';
  else display.textContent = amountStr;
  updateSpendingSave();
}

function selectCategory(btn) {
  document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedCategory = btn.dataset.cat;
  updateSpendingSave();
}

function updateSpendingSave() {
  const amt = parseFloat(amountStr);
  document.getElementById('spending-save').disabled = !(amt > 0 && selectedCategory);
}

function saveSpending() {
  const entry = { amount: parseFloat(amountStr), category: selectedCategory, timestamp: new Date().toISOString() };
  const data = getData('spending');
  data.push(entry);
  setData('spending', data);
  amountStr = '';
  selectedCategory = null;
  document.getElementById('amount-value').textContent = '0.00';
  document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('spending-save').disabled = true;
  showToast('$' + entry.amount.toFixed(2) + ' \u2014 ' + entry.category);
  renderRecentSpending();
  updateCounts();
}

function renderRecentSpending() {
  const data = getData('spending');
  const recent = data.slice(-5).reverse();
  const el = document.getElementById('recent-spending');
  if (recent.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = '<p class="section-title" style="margin-top:0">Recent</p>' +
    recent.map(e => {
      const d = new Date(e.timestamp);
      const time = d.toLocaleTimeString([], {hour: 'numeric', minute: '2-digit'});
      return '<div class="recent-entry"><span class="entry-cat">' + e.category + '</span><span class="entry-amount">$' + e.amount.toFixed(2) + '</span><span class="entry-time">' + time + '</span></div>';
    }).join('');
}

let defusionState = { trigger: null, intensity: null, outcome: null, startTime: null };
let timerInterval = null;

function startDefusion() {
  defusionState = { trigger: null, intensity: null, outcome: null, startTime: new Date().toISOString() };
  document.getElementById('defusion-ready').classList.add('hidden');
  document.getElementById('defusion-timer').classList.remove('hidden');
  document.getElementById('defusion-followup').classList.add('hidden');
  document.getElementById('defusion-export').classList.add('hidden');
  let remaining = 120;
  const circumference = 2 * Math.PI * 90;
  const progress = document.getElementById('ring-progress');
  const display = document.getElementById('timer-display');
  progress.style.strokeDashoffset = '0';
  display.textContent = '2:00';
  timerInterval = setInterval(() => {
    remaining--;
    const min = Math.floor(remaining / 60);
    const sec = remaining % 60;
    display.textContent = min + ':' + (sec < 10 ? '0' : '') + sec;
    const offset = circumference * (1 - remaining / 120);
    progress.style.strokeDashoffset = offset;
    if (remaining <= 0) {
      clearInterval(timerInterval);
      document.getElementById('defusion-timer').classList.add('hidden');
      document.getElementById('defusion-followup').classList.remove('hidden');
    }
  }, 1000);
}

function selectTrigger(btn) {
  document.querySelectorAll('#trigger-options .followup-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  defusionState.trigger = btn.dataset.val;
  updateDefusionSave();
}

function selectIntensity(btn) {
  document.querySelectorAll('#intensity-options .intensity-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  defusionState.intensity = parseInt(btn.dataset.val);
  updateDefusionSave();
}

function selectOutcome(btn) {
  document.querySelectorAll('#outcome-options .outcome-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  defusionState.outcome = btn.dataset.val;
  updateDefusionSave();
}

function updateDefusionSave() {
  const ready = defusionState.trigger && defusionState.intensity && defusionState.outcome;
  document.getElementById('defusion-save').disabled = !ready;
}

function saveDefusion() {
  const entry = { trigger: defusionState.trigger, intensity: defusionState.intensity, outcome: defusionState.outcome, startTime: defusionState.startTime, timestamp: new Date().toISOString() };
  const data = getData('defusion');
  data.push(entry);
  setData('defusion', data);
  document.getElementById('defusion-followup').classList.add('hidden');
  document.getElementById('defusion-ready').classList.remove('hidden');
  document.getElementById('defusion-export').classList.remove('hidden');
  document.querySelectorAll('#trigger-options .followup-btn, #intensity-options .intensity-btn, #outcome-options .outcome-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('defusion-save').disabled = true;
  showToast('Defusion logged');
  renderRecentDefusion();
  updateCounts();
}

function renderRecentDefusion() {
  const data = getData('defusion');
  const recent = data.slice(-5).reverse();
  const el = document.getElementById('recent-defusion');
  if (recent.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = '<p class="section-title" style="margin-top:0">Recent</p>' +
    recent.map(e => {
      const d = new Date(e.timestamp);
      const time = d.toLocaleTimeString([], {hour: 'numeric', minute: '2-digit'});
      const outcomeColor = e.outcome === 'Stayed on plan' ? 'var(--green)' : 'var(--amber)';
      return '<div class="recent-entry"><span class="entry-cat">' + e.trigger + ' \u2014 ' + e.intensity + '/5</span><span class="entry-amount" style="color:' + outcomeColor + ';font-size:13px">' + e.outcome + '</span><span class="entry-time">' + time + '</span></div>';
    }).join('');
}

let checkinState = { energy: null, mood: null };

function selectEnergy(btn) {
  document.querySelectorAll('#energy-col .checkin-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  checkinState.energy = parseInt(btn.dataset.val);
  updateCheckinSave();
}

function selectMood(btn) {
  document.querySelectorAll('#mood-col .checkin-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  checkinState.mood = parseInt(btn.dataset.val);
  updateCheckinSave();
}

function updateCheckinSave() {
  document.getElementById('checkin-save').disabled = !(checkinState.energy && checkinState.mood);
}

function saveCheckin() {
  const energyLabels = {1:'Dragging',2:'Low',3:'Steady',4:'Strong',5:'Sharp'};
  const moodLabels = {1:'Heavy',2:'Flat',3:'Okay',4:'Good',5:'Bright'};
  const entry = { energy: checkinState.energy, energyLabel: energyLabels[checkinState.energy], mood: checkinState.mood, moodLabel: moodLabels[checkinState.mood], timestamp: new Date().toISOString() };
  const data = getData('checkin');
  data.push(entry);
  setData('checkin', data);
  checkinState = { energy: null, mood: null };
  document.querySelectorAll('.checkin-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('checkin-save').disabled = true;
  showToast('Energy ' + entry.energy + ' \u2014 Mood ' + entry.mood);
  renderRecentCheckin();
  updateCounts();
}

function renderRecentCheckin() {
  const data = getData('checkin');
  const recent = data.slice(-5).reverse();
  const el = document.getElementById('recent-checkin');
  if (recent.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = '<p class="section-title">Recent</p>' +
    recent.map(e => {
      const d = new Date(e.timestamp);
      const time = d.toLocaleTimeString([], {hour: 'numeric', minute: '2-digit'});
      return '<div class="recent-entry"><span class="entry-cat">Energy: ' + e.energy + ' (' + e.energyLabel + ')</span><span class="entry-amount">Mood: ' + e.mood + ' (' + e.moodLabel + ')</span><span class="entry-time">' + time + '</span></div>';
    }).join('');
}

async function exportData(type) {
  let exportObj = {};
  const now = new Date().toISOString().split('T')[0];
  const filename = 'q2-tracker-' + (type === 'all' ? 'all' : type) + '-' + now + '.json';

  if (type === 'all') {
    exportObj = {
      exported: new Date().toISOString(),
      spending: getData('spending'),
      defusion: getData('defusion'),
      checkin: getData('checkin')
    };
  } else {
    exportObj = {
      exported: new Date().toISOString(),
      [type]: getData(type)
    };
  }

  const jsonString = JSON.stringify(exportObj, null, 2);
  const blob = new Blob([jsonString], {type: 'application/json'});
  const file = new File([blob], filename, {type: 'application/json'});

  // Use Web Share API (iOS Share sheet) if available
  if (navigator.canShare && navigator.canShare({files: [file]})) {
    try {
      await navigator.share({
        title: 'Q2 Tracker Data',
        files: [file]
      });
      showToast('Exported ' + type);
    } catch (e) {
      if (e.name !== 'AbortError') {
        showToast('Export cancelled');
      }
    }
  } else {
    // Fallback for desktop browsers
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Exported ' + type);
  }
}

function updateCounts() {
  const s = getData('spending').length;
  const d = getData('defusion').length;
  const c = getData('checkin').length;
  document.getElementById('data-counts').textContent = s + ' spending \u00B7 ' + d + ' defusion \u00B7 ' + c + ' check-ins';
}

renderRecentSpending();
renderRecentDefusion();
renderRecentCheckin();
updateCounts();
</script>
